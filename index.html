<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Video</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      background: black;
      overflow: hidden;
    }

    .video-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .logo {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 10;
    }

    .logo img {
      width: 120px;
      opacity: 0.9;
    }
  </style>
</head>
<body>

<div class="logo">
  <img src="logo.png" alt="Logo">
</div>

<div class="video-container">
 <iframe 
  id="video"
  src="https://www.youtube.com/embed/V7xV7OcoCl0?autoplay=1&mute=1&controls=0&loop=1&playlist=V7xV7OcoCl0"
  allow="autoplay; fullscreen">
</iframe>

<script>
document.addEventListener("click", function() {
  let iframe = document.getElementById("video");
  iframe.src = "https://www.youtube.com/embed/V7xV7OcoCl0?autoplay=1&mute=0&controls=0&loop=1&playlist=V7xV7OcoCl0";
});
</script>
</div>

</body>
</html>
